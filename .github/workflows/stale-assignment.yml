name: Remove Stale Assignments

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest

    permissions:
      issues: write
      pull-requests: read

    steps:
      - name: Remove stale assignees
        uses: actions/github-script@v7
        with:
          script: |
            const issues = await github.paginate(
              github.rest.issues.listForRepo,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open'
              }
            );

            for (const issue of issues) {
              if (issue.assignees.length === 0) continue;

              const assignedAt = new Date(issue.updated_at);
              const now = new Date();

              const diffDays =
                (now - assignedAt) / (1000 * 60 * 60 * 24);

              if (diffDays < 5) continue;

              const prs = await github.paginate(
                github.rest.pulls.list,
                {
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  state: 'open'
                }
              );

              const hasPR = prs.some(
                pr => pr.user.login === issue.assignees[0].login
              );

              if (hasPR) continue;

              await github.rest.issues.removeAssignees({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                assignees: [issue.assignees[0].login]
              });

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `⏰ Assignment removed because no PR was submitted within 5 days.`
              });
            }
