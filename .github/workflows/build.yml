name: Build

on:
  pull_request:
    branches:
      - main
    paths:
      - 'project/**'
      - 'package.json'
      - 'vercel.json'
      - '.github/workflows/build.yml'
  push:
    branches:
      - main
    paths:
      - 'project/**'
      - 'package.json'
      - 'vercel.json'
      - '.github/workflows/build.yml'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
